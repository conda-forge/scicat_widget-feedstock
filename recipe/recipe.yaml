schema_version: 1

context:
  python_min: "3.11"
  version: "26.7.2"

package:
  name: scicat_widget
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/scicat_widget/scicat_widget-${{ version }}.tar.gz
  sha256: e38e451e9112e47afb4cb141ba4810803a4f372199bef11e39f556dcfd957e04

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - hatch-jupyter-builder >=0.5.0
    - hatch-vcs
    - pip
  run:
    - python >=${{ python_min }}
    - anywidget >=0.9.21
    - ipykernel >=6.30.1
    - jupyter_host_file_picker >=26.7.0
    - pydantic >=2.12
    - scitacean >=26.7.1

tests:
  - python:
      imports:
        - scicat_widget
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: SciCat dataset widget
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://pypi.org/project/scicat-widget/
  repository: https://github.com/SciCatProject/scicat_widget

extra:
  recipe-maintainers:
    - jl-wynen
    - YooSunYoung
